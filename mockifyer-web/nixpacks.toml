[phases.setup]
# Install exact Node.js version 20.19.5 directly BEFORE Nixpacks installs its version
# Must happen early to override Nixpacks' auto-detected Node.js
cmds = [
  "curl -fsSL https://nodejs.org/dist/v20.19.5/node-v20.19.5-linux-x64.tar.xz -o /tmp/node.tar.xz || true",
  "tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1 2>/dev/null || true",
  "rm -f /tmp/node.tar.xz",
  "export PATH=/usr/local/bin:$PATH",
  "node --version || echo 'Node not yet installed'",
  "rm -f package-lock.json package-lock.prod.json 2>/dev/null || true"
]

[phases.install]
cmds = [
  "node --version",
  "rm -f package-lock.json package-lock.prod.json 2>/dev/null || true",
  "cp package.prod.json package.json 2>/dev/null || true",
  "npm install -g npm@latest",
  "npm --version",
  "echo '@sgedda:registry=https://npm.pkg.github.com' > .npmrc",
  "echo '//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}' >> .npmrc",
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  "export PATH=/usr/local/bin:$PATH",
  "node --version",
  "npm --version",
  "echo '📦 Starting build process...'",
  "echo '🧹 Cleaning previous builds...'",
  "rm -rf public/* || true",
  "rm -rf frontend/dist || true",
  "rm -rf frontend/node_modules/.vite || true",
  "echo '🔨 Building frontend and backend...'",
  "npm run build || (echo '❌ Build failed!' && exit 1)",
  "echo '✅ Build completed successfully'",
  "echo '🔍 Verifying build output...'",
  "ls -la public/ || echo '⚠️  public directory check'",
  "ls -la public/assets/ || echo '⚠️  public/assets directory check'",
  "test -f public/index.html || (echo '❌ index.html not found!' && exit 1)",
  "echo '✅ Frontend build verified - index.html exists'",
  "test -d public/assets || (echo '❌ assets directory not found!' && exit 1)",
  "echo '✅ Assets directory verified'",
  "mkdir -p mock-data || true",
  "mkdir -p public || true",
  "echo '{\"deployedDate\":\"'$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)'\"}' > public/build-info.json",
  "echo 'ℹ️  Note: Railway volumes are only available at runtime, not during build phase'",
  "echo 'ℹ️  The volume at /persisted/mock-data will be checked when the app starts'"
]

[start]
cmd = "export PATH=/usr/local/bin:$PATH && npm start"


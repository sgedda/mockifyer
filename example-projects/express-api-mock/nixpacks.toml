[phases.setup]
# Install exact Node.js version 20.19.5 directly BEFORE Nixpacks installs its version
# Must happen early to override Nixpacks' auto-detected Node.js
cmds = [
  "curl -fsSL https://nodejs.org/dist/v20.19.5/node-v20.19.5-linux-x64.tar.xz -o /tmp/node.tar.xz || true",
  "tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1 2>/dev/null || true",
  "rm -f /tmp/node.tar.xz",
  "export PATH=/usr/local/bin:$PATH",
  "node --version || echo 'Node not yet installed'",
  "rm -f package-lock.json package-lock.prod.json 2>/dev/null || true"
]

[phases.install]
cmds = [
  "node --version",
  "rm -f package-lock.json package-lock.prod.json 2>/dev/null || true",
  "cp package.prod.json package.json 2>/dev/null || true",
  "npm install -g npm@latest",
  "npm --version",
  "echo '@sgedda:registry=https://npm.pkg.github.com' > .npmrc",
  "echo '//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}' >> .npmrc",
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  "export PATH=/usr/local/bin:$PATH",
  "node --version",
  "npm run build"
]

[start]
cmd = "export PATH=/usr/local/bin:$PATH && npm start"


[phases.setup]
nixPkgs = ["nodejs-20_x"]

[phases.install]
cmds = [
  "cd example-projects/express-api-mock",
  "cp package.prod.json package.json",
  "cp package-lock.prod.json package-lock.json",
  "npm ci"
]

[phases.build]
cmds = [
  "cd example-projects/express-api-mock",
  "npm run build"
]

[start]
cmd = "cd example-projects/express-api-mock && npm start"


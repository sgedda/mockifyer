[phases.setup]
# Let Nixpacks auto-detect Node.js version from .nvmrc (20.19.5)
# Delete lockfiles in setup phase to prevent Railpack auto-detection
cmds = [
  "rm -f package-lock.json package-lock.prod.json 2>/dev/null || true"
]

[phases.install]
cmds = [
  "rm -f package-lock.json package-lock.prod.json 2>/dev/null || true",
  "cp package.prod.json package.json 2>/dev/null || true",
  "npm install -g npm@latest",
  "npm --version",
  "echo '@sgedda:registry=https://npm.pkg.github.com' > .npmrc",
  "echo '//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}' >> .npmrc",
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "npm start"


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockifyer Test Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-right: 10px;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .response-container {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .response-container.mocked {
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            border-left-color: #4caf50;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.2);
        }

        .response-container.real-api {
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
            border-left-color: #ff9800;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.2);
        }

        .response-container h3 {
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mock-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.9em;
            font-weight: 700;
            margin-left: 10px;
            animation: pulse 2s infinite;
            box-shadow: 0 2px 8px rgba(17, 153, 142, 0.4);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.9;
                transform: scale(1.02);
            }
        }

        .real-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.9em;
            font-weight: 700;
            margin-left: 10px;
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.4);
        }

        .mock-info {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            padding: 18px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 5px solid #2e7d32;
            box-shadow: 0 2px 8px rgba(46, 125, 50, 0.2);
        }

        .mock-info h4 {
            color: #1b5e20;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
        }

        .mock-info p {
            color: #2e7d32;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            font-weight: 500;
        }

        .real-api-info {
            background: linear-gradient(135deg, #ffe0b2 0%, #ffcc80 100%);
            padding: 18px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 5px solid #f57c00;
            box-shadow: 0 2px 8px rgba(245, 124, 0, 0.2);
        }

        .real-api-info h4 {
            color: #e65100;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
        }

        .real-api-info p {
            color: #bf360c;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            font-weight: 500;
        }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.5;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }

        .error h3 {
            color: #f44336;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-ok {
            background: #4caf50;
        }

        .status-error {
            background: #f44336;
        }

        .emoji {
            font-size: 1.2em;
        }

        .status-banner {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-banner h2 {
            color: #667eea;
            margin: 0;
            font-size: 1.3em;
        }

        .status-banner .status-items {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
        }

        .status-item strong {
            color: #333;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #333;
            transition: opacity 0.2s;
        }

        .github-link:hover {
            opacity: 0.7;
        }

        .github-logo {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .status-value {
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .status-value.enabled {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-value.disabled {
            background: #ffcdd2;
            color: #c62828;
        }

        .status-value.recording {
            background: #fff3e0;
            color: #e65100;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 20px;
            }

            .container {
                max-width: 100%;
            }

            .card {
                padding: 15px;
                margin-bottom: 15px;
            }

            .card h2 {
                font-size: 1.2em;
                margin-bottom: 15px;
            }

            .status-banner {
                padding: 15px;
                margin-bottom: 20px;
                flex-direction: column;
                align-items: flex-start;
            }

            .status-banner h2 {
                font-size: 1.1em;
                margin-bottom: 10px;
            }

            .status-banner .status-items {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }

            .status-item {
                flex-wrap: wrap;
            }

            button {
                width: 100%;
                margin-right: 0;
                margin-bottom: 10px;
                padding: 14px 20px;
                font-size: 16px;
            }

            button:last-child {
                margin-bottom: 0;
            }

            input,
            select {
                padding: 14px;
                font-size: 16px;
                /* Prevents zoom on iOS */
            }

            .form-group {
                margin-bottom: 15px;
            }

            .response-container {
                padding: 15px;
                margin-top: 15px;
            }

            .response-container h3 {
                font-size: 1em;
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .mock-badge,
            .real-badge {
                margin-left: 0;
                margin-top: 5px;
                font-size: 0.85em;
                padding: 6px 12px;
            }

            .mock-info,
            .real-api-info {
                padding: 12px;
                font-size: 0.9em;
            }

            .mock-info h4,
            .real-api-info h4 {
                font-size: 1em;
            }

            .mock-info p,
            .real-api-info p {
                font-size: 0.85em;
                word-break: break-word;
            }

            pre {
                font-size: 12px;
                padding: 12px;
                overflow-x: auto;
            }

            /* Button containers - stack on mobile */
            .card>div[style*="display: flex"] {
                flex-direction: column;
            }

            .card>div[style*="display: flex"] button {
                width: 100%;
                margin-right: 0;
            }

            /* Mock files list mobile styles */
            #mock-files-list>div {
                gap: 12px;
            }

            #mock-files-list>div>div {
                padding: 12px !important;
            }

            #mock-files-list>div>div>div[style*="display: flex"] {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 12px !important;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div {
                width: 100%;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div>strong {
                display: block;
                word-break: break-all;
                font-size: 0.95em;
                line-height: 1.4;
                margin-bottom: 8px;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div>div {
                font-size: 0.85em;
                line-height: 1.5;
                word-break: break-word;
            }

            #mock-files-list>div>div>div[style*="display: flex"] button {
                width: 100%;
                margin-top: 0;
                margin-left: 0 !important;
                padding: 12px 16px;
                font-size: 0.95em;
            }

            /* Mock file viewer mobile */
            #mock-file-viewer pre {
                font-size: 11px;
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }

            .card {
                padding: 12px;
            }

            .card h2 {
                font-size: 1.1em;
            }

            .status-banner {
                padding: 12px;
            }

            .response-container {
                padding: 12px;
            }

            pre {
                font-size: 11px;
            }

            /* Mock files list - extra small screens */
            #mock-files-list>div>div {
                padding: 10px !important;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div>strong {
                font-size: 0.9em;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div>div {
                font-size: 0.8em;
            }

            #mock-files-list>div>div>div[style*="display: flex"] button {
                padding: 10px 14px;
                font-size: 0.9em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎭 Mockifyer Test Dashboard</h1>

        <div class="status-banner" id="status-banner">
            <h2>📊 Current Status</h2>
            <div class="status-items" id="status-items">
                <div class="status-item">
                    <strong>Loading...</strong>
                </div>
            </div>

        <!-- Football Fixtures Card -->
        <div class="card">
            <h2>⚽ Football Fixtures</h2>
            <div class="form-group">

                <label for="team-id-input">Team (optional):</label>

                    <optgroup label="Premier League">
                        <option value="33">Manchester United</option>

                    </optgroup>
                    <optgroup label="La Liga">
                        <option value="541">Barcelona</option>
                        <option value="541">Real Madrid</option>
                        <option value="548">Atletico Madrid</option>
                        <option value="543">Sevilla</option>
                        <option value="531">Valencia</option>
                    </optgroup>
                    <optgroup label="Bundesliga">
                        <option value="157">Bayern Munich</option>
                        <option value="165">Borussia Dortmund</option>
                        <option value="173">RB Leipzig</option>
                        <option value="161">Bayer Leverkusen</option>
                    </optgroup>
                    <optgroup label="Serie A">
                        <option value="489">AC Milan</option>
                        <option value="489">Inter Milan</option>
                        <option value="487">Juventus</option>
                        <option value="497">Napoli</option>
                        <option value="502">Roma</option>
                    </optgroup>
                    <optgroup label="Ligue 1">
                        <option value="85">Paris Saint-Germain</option>
                        <option value="516">Monaco</option>
                        <option value="523">Lyon</option>
                        <option value="516">Marseille</option>
                    </optgroup>
                </select>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button onclick="getFixtures()">Get Fixtures</button>
                <button onclick="deleteFixturesMock()"
                    style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);">Delete Mock</button>
            </div>
            <div id="delete-fixtures-message" style="margin-top: 10px;"></div>
            <div id="fixtures-response"></div>
        </div>

        <!-- Football Standings Card -->
        <div class="card">
            <h2>🏆 League Standings</h2>
            <div class="form-group">
                <label for="standings-league-input">League:</label>
                <select id="standings-league-input">
                    <option value="">Select a league...</option>
                    <optgroup label="Top 5 Leagues">
                        <option value="39" selected>Premier League (England)</option>
                        <option value="140">La Liga (Spain)</option>
                        <option value="78">Bundesliga (Germany)</option>
                        <option value="135">Serie A (Italy)</option>
                        <option value="61">Ligue 1 (France)</option>
                    </optgroup>
                    <optgroup label="Other European Leagues">
                        <option value="88">Eredivisie (Netherlands)</option>
                        <option value="203">Süper Lig (Turkey)</option>
                        <option value="94">Primeira Liga (Portugal)</option>
                        <option value="144">Jupiler Pro League (Belgium)</option>
                    </optgroup>
                    <optgroup label="International Competitions">
                        <option value="2">UEFA Champions League</option>
                        <option value="3">UEFA Europa League</option>
                        <option value="848">UEFA Conference League</option>
                    </optgroup>
                    <optgroup label="Other Leagues">
                        <option value="253">MLS (USA)</option>
                        <option value="71">Brasileirão (Brazil)</option>
                        <option value="262">Liga MX (Mexico)</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label for="season-input">Season (optional):</label>
                <input type="number" id="season-input" placeholder="e.g., 2024" value="2024">
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button onclick="getStandings()">Get Standings</button>
                <button onclick="deleteStandingsMock()"
                    style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);">Delete Mock</button>
            </div>
            <div id="delete-standings-message" style="margin-top: 10px;"></div>
            <div id="standings-response"></div>
        </div>

        <!-- Football Team Info Card -->
        <div class="card">
            <h2>👥 Team Information</h2>
            <div class="form-group">
                <label for="team-id-info-input">Team:</label>
                <select id="team-id-info-input">
                    <option value="">Select a team...</option>
                    <optgroup label="Premier League">
                        <option value="33" selected>Manchester United</option>
                        <option value="50">Manchester City</option>
                        <option value="40">Liverpool</option>
                        <option value="42">Arsenal</option>
                        <option value="49">Chelsea</option>
                        <option value="47">Tottenham</option>
                        <option value="66">Aston Villa</option>
                        <option value="51">Brighton</option>
                    </optgroup>
                    <optgroup label="La Liga">
                        <option value="541">Barcelona</option>
                        <option value="541">Real Madrid</option>
                        <option value="548">Atletico Madrid</option>
                        <option value="543">Sevilla</option>
                        <option value="531">Valencia</option>
                    </optgroup>
                    <optgroup label="Bundesliga">
                        <option value="157">Bayern Munich</option>
                        <option value="165">Borussia Dortmund</option>
                        <option value="173">RB Leipzig</option>
                        <option value="161">Bayer Leverkusen</option>
                    </optgroup>
                    <optgroup label="Serie A">
                        <option value="489">AC Milan</option>
                        <option value="489">Inter Milan</option>
                        <option value="487">Juventus</option>
                        <option value="497">Napoli</option>
                        <option value="502">Roma</option>
                    </optgroup>
                    <optgroup label="Ligue 1">
                        <option value="85">Paris Saint-Germain</option>
                        <option value="516">Monaco</option>
                        <option value="523">Lyon</option>
                        <option value="516">Marseille</option>
                    </optgroup>
                </select>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button onclick="getTeamInfo()">Get Team Info</button>
                <button onclick="deleteTeamInfoMock()"
                    style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);">Delete Mock</button>
            </div>
            <div id="delete-team-info-message" style="margin-top: 10px;"></div>
            <div id="team-info-response"></div>
        </div>

        <!-- Current Weather Card -->
        <div class="card">
            <h2>🌤️ Current Weather</h2>
            <div class="form-group">
                <label for="city-input">City Name:</label>
                <input type="text" id="city-input" placeholder="e.g., London, New York, Tokyo" value="London">
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button onclick="getCurrentWeather()">Get Current Weather</button>
                <button onclick="deleteCurrentWeatherMock()"
                    style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);">Delete Mock</button>
            </div>
            <div id="delete-message" style="margin-top: 10px;"></div>
            <div id="current-weather-response"></div>
        </div>

        <!-- Forecast Card -->
        <div class="card">
            <h2>📅 Weather Forecast</h2>
            <div class="form-group">
                <label for="forecast-city-input">City Name:</label>
                <input type="text" id="forecast-city-input" placeholder="e.g., London, New York, Tokyo" value="London">
            </div>
            <div class="form-group">
                <label for="days-input">Number of Days:</label>
                <select id="days-input">
                    <option value="1">1 day</option>
                    <option value="2">2 days</option>
                    <option value="3" selected>3 days</option>
                    <option value="5">5 days</option>
                    <option value="7">7 days</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button onclick="getForecast()">Get Forecast</button>
                <button onclick="deleteForecastMock()"
                    style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);">Delete Mock</button>
            </div>
            <div id="delete-forecast-message" style="margin-top: 10px;"></div>
            <div id="forecast-response"></div>
        </div>

        <!-- GraphQL Query Card -->
        <div class="card">
            <h2>🔷 GraphQL Query</h2>
            <div class="form-group">
                <label for="graphql-query-input">GraphQL Query:</label>
                <textarea id="graphql-query-input" rows="8"
                    style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: 'Courier New', monospace; resize: vertical;"
                    placeholder="Enter your GraphQL query here...">query ($page: Int) {
  characters(page: $page) {
    results {
      id
      name
      status
      species
    }
  }
}</textarea>
            </div>
            <div class="form-group">
                <label for="graphql-variables-input">Variables (JSON, optional):</label>
                <textarea id="graphql-variables-input" rows="3"
                    style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: 'Courier New', monospace; resize: vertical;"
                    placeholder='{"page": 1}'>{"page": 3}</textarea>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button onclick="executeGraphQLQuery()">Execute Query</button>
                <button onclick="deleteGraphQLMock()"
                    style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);">Delete Mock</button>
            </div>
            <div id="delete-graphql-message" style="margin-top: 10px;"></div>
            <div id="graphql-response"></div>
        </div>

        <!-- Mock Files Browser Card -->
        <div class="card">
            <h2>📁 Mock Data Files</h2>
            <button onclick="loadMockFiles()" style="margin-bottom: 15px;">Refresh List</button>
            <div id="mock-files-list"></div>
            <div id="mock-file-viewer" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function makeRequest (url, options = {}) {
            const startTime = performance.now();
            try {
                const response = await fetch(url, options);
                const endTime = performance.now();
                const responseTime = Math.round(endTime - startTime);
                const data = await response.json();
                // Check for mock header (case-insensitive)
                const mockHeader = response.headers.get('x-mockifyer') ||
                    response.headers.get('X-Mockifyer') ||
                    response.headers.get('X-MOCKIFYER');
                const isMocked = mockHeader === 'true';

                console.log('[Dashboard] Response headers:', Object.fromEntries(response.headers.entries()));
                console.log('[Dashboard] Mock header value:', mockHeader);
                console.log('[Dashboard] Is mocked:', isMocked);

                return {
                    success: response.ok,
                    data,
                    status: response.status,
                    headers: Object.fromEntries(response.headers.entries()),
                    isMocked: isMocked,
                    mockTimestamp: response.headers.get('x-mockifyer-timestamp') || response.headers.get('X-Mockifyer-Timestamp'),
                    mockFilename: response.headers.get('x-mockifyer-filename') || response.headers.get('X-Mockifyer-Filename'),
                    mockFilepath: response.headers.get('x-mockifyer-filepath') || response.headers.get('X-Mockifyer-Filepath'),
                    responseTime: responseTime
                };
            } catch (error) {
                return {
                    success: false,
                    error: error.message,
                    isMocked: false
                };
            }
        }

        function displayResponse (containerId, result, title) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (!result) return;

            const responseDiv = document.createElement('div');
            const containerClass = result.success
                ? (result.isMocked ? 'mocked' : 'real-api')
                : 'error';
            responseDiv.className = `response-container ${containerClass}`;

            const titleEl = document.createElement('h3');
            const statusText = result.isMocked
                ? '<span class="mock-badge">🎭 USING MOCK DATA</span>'
                : '<span class="real-badge">🌐 REAL API CALL</span>';
            titleEl.innerHTML = `
                <span class="status-indicator ${result.success ? 'status-ok' : 'status-error'}"></span>
                ${title}
                ${statusText}
            `;
            titleEl.style.fontSize = '1.3em';
            titleEl.style.marginBottom = '20px';
            responseDiv.appendChild(titleEl);

            // Add a prominent banner at the top
            const banner = document.createElement('div');
            banner.style.cssText = `
                padding: 15px 20px;
                border-radius: 8px;
                margin-bottom: 20px;
                font-weight: 700;
                font-size: 1.1em;
                text-align: center;
                ${result.isMocked
                    ? 'background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);'
                    : 'background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);'}
            `;
            banner.innerHTML = result.isMocked
                ? '🎭 This response came from MOCK DATA - No external API call was made!'
                : '🌐 This response came from REAL API - External API call was made!';
            responseDiv.insertBefore(banner, titleEl);

            if (result.success) {
                if (result.isMocked && result.mockTimestamp) {
                    const mockInfo = document.createElement('div');
                    mockInfo.className = 'mock-info';

                    let fileInfo = '';
                    if (result.mockFilename) {
                        // Try to make path relative if it's an absolute path
                        let displayPath = result.mockFilepath || result.mockFilename;
                        // Remove common workspace patterns to make it more readable
                        displayPath = displayPath.replace(/^.*\/(mock-data|mockifyer)/, '$1');
                        fileInfo = `
                            <p><strong>📁 Mock File Name:</strong> <code style="background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 4px; font-weight: 600;">${result.mockFilename}</code></p>
                            <p><strong>📂 File Path:</strong> <code style="background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 4px; word-break: break-all; font-family: 'Courier New', monospace; font-size: 0.9em;">${displayPath}</code></p>
                        `;
                    }

                    mockInfo.innerHTML = `
                        <h4>✨ Mockifyer Information - Using Mock Data 🎭</h4>
                        <p><strong>📅 Mock Created:</strong> ${new Date(result.mockTimestamp).toLocaleString()}</p>
                        <p><strong>⚡ Response Time:</strong> ${result.responseTime}ms (mocked - instant!)</p>
                        <p><strong>✅ Status Code:</strong> ${result.status}</p>
                        <p><strong>💾 Source:</strong> Mock data file</p>
                        ${fileInfo}
                    `;
                    responseDiv.appendChild(mockInfo);
                } else {
                    const realInfo = document.createElement('div');
                    realInfo.className = 'real-api-info';
                    realInfo.innerHTML = `
                        <h4>🌐 Real API Call Information - Using External API</h4>
                        <p><strong>⏱️ Response Time:</strong> ${result.responseTime}ms</p>
                        <p><strong>✅ Status Code:</strong> ${result.status}</p>
                        <p><strong>🌍 Source:</strong> External API (WeatherAPI)</p>
                        <p><strong>💡 Tip:</strong> Enable MOCKIFYER_ENABLED=true to use mock data</p>
                    `;
                    responseDiv.appendChild(realInfo);
                }

                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(result.data, null, 2);
                responseDiv.appendChild(pre);
            } else {
                const errorDiv = document.createElement('div');
                errorDiv.innerHTML = `<p><strong>Error:</strong> ${result.error || JSON.stringify(result.data, null, 2)}</p>`;
                responseDiv.appendChild(errorDiv);
            }

        }

        // Filter teams based on selected league
        function filterTeamsByLeague () {
            const leagueSelect = document.getElementById('league-id-input');
            const teamSelect = document.getElementById('team-id-input');
            const selectedLeague = leagueSelect.value;

            // Map league IDs to team optgroup labels (only for leagues that have teams listed)
            const leagueToTeamGroup = {
                '39': 'Premier League',
                '140': 'La Liga',
                '78': 'Bundesliga',
                '135': 'Serie A',
                '61': 'Ligue 1'
            };

            // Get all optgroups in the team select
            const optgroups = teamSelect.querySelectorAll('optgroup');

            if (!selectedLeague) {
                // If no league selected, show all teams
                optgroups.forEach(group => {
                    group.style.display = '';
                });
                // Reset team selection
                teamSelect.value = '';
            } else {
                // Get the team group name for the selected league
                const targetGroup = leagueToTeamGroup[selectedLeague];

                if (targetGroup) {
                    // Hide all optgroups except the one matching the selected league
                    optgroups.forEach(group => {
                        if (group.label === targetGroup) {
                            group.style.display = '';
                        } else {
                            group.style.display = 'none';
                        }
                    });
                    // Reset team selection when league changes
                    teamSelect.value = '';
                } else {
                    // If league not in map (other leagues), hide all teams since we don't have teams for them
                    optgroups.forEach(group => {
                        group.style.display = 'none';
                    });
                    teamSelect.value = '';
                }
            }
        }

        // Helper function to find a mock file by request parameters
        async function findMockFileByParams (endpointType, city, days = null) {
            try {
                // Get list of all mock files
                const listResponse = await fetch(`${API_BASE}/api/mocks`);
                const listData = await listResponse.json();
                const files = listData.files || [];

                // Search through mock files to find a match
                for (const file of files) {
                    try {
                        const fileResponse = await fetch(`${API_BASE}/api/mocks/${encodeURIComponent(file.filename)}`);
                        const fileData = await fileResponse.json();

                        if (!fileData.data || !fileData.data.request) continue;

                        const request = fileData.data.request;
                        const url = request.url || '';
                        const queryParams = request.queryParams || {};

                        // Check if this is the right endpoint type
                        const isCurrentWeather = endpointType === 'current' && url.includes('/current.json');
                        const isForecast = endpointType === 'forecast' && url.includes('/forecast.json');

                        if (!isCurrentWeather && !isForecast) continue;

                        // Check if city matches (case-insensitive)
                        const mockCity = queryParams.q;
                        if (!mockCity || mockCity.toLowerCase() !== city.toLowerCase()) continue;

                        // For forecast, check if days match (if specified)
                        if (endpointType === 'forecast' && days !== null) {
                            const mockDays = queryParams.days;
                            if (mockDays !== days.toString()) continue;
                        }

                        // Found a match!
                        return file.filename;
                    } catch (error) {
                        // Skip files that can't be read
                        console.warn(`[DeleteMock] Could not read file ${file.filename}:`, error);
                        continue;
                    }
                }

                return null; // No match found
            } catch (error) {
                console.error('[DeleteMock] Error finding mock file:', error);
                throw error;
            }
        }

        // GraphQL Functions
        async function executeGraphQLQuery () {
            const button = event.target;
            const query = document.getElementById('graphql-query-input').value.trim();
            const variablesText = document.getElementById('graphql-variables-input').value.trim();

            if (!query) {
                alert('Please enter a GraphQL query');
                return;
            }

            let variables = {};
            if (variablesText) {
                try {
                    variables = JSON.parse(variablesText);
                } catch (error) {
                    alert('Invalid JSON in variables field. Please check your syntax.');
                    return;
                }
            }

            button.disabled = true;
            button.innerHTML = '<span class="loading"></span> Loading...';

            try {
                const result = await makeRequest(`${API_BASE}/api/graphql/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query, variables })
                });
                displayResponse('graphql-response', result, 'GraphQL Query Result');
                if (result.success) {
                    loadMockFiles();
                }
            } catch (error) {
                displayResponse('graphql-response', {
                    success: false,
                    error: error.message,
                    isMocked: false
                }, 'GraphQL Query Error');
            }

            button.disabled = false;
            button.textContent = 'Execute Query';
        }

                            method: 'DELETE'
                        });
                        if (deleteResult.ok) {
                            document.getElementById('delete-graphql-message').innerHTML =
                                `<div style="padding: 10px; background: #c8e6c9; border-radius: 8px; color: #2e7d32;">
                                    <strong>✅ Deleted:</strong> ${file.filename}
                                </div>`;
                            loadMockFiles();
                            return;
                        }
                    }
                }
                document.getElementById('delete-graphql-message').innerHTML =
                    '<div style="padding: 10px; background: #fff3e0; border-radius: 8px; color: #e65100;">No GraphQL mock file found.</div>';
            } catch (error) {
                document.getElementById('delete-graphql-message').innerHTML =
                    `<div style="padding: 10px; background: #ffebee; border-radius: 8px; color: #c62828;">
                        <strong>❌ Error:</strong> ${error.message}
                    </div>`;
            }
        }

        // Load and display mock files
        async function loadMockFiles () {
            const listContainer = document.getElementById('mock-files-list');
            listContainer.innerHTML = '<div style="padding: 10px;">Loading...</div>';

            try {
                const response = await fetch(`${API_BASE}/api/mocks`);
                const data = await response.json();
                const files = data.files || [];

                if (files.length === 0) {
                    listContainer.innerHTML = '<div style="padding: 10px; color: #666;">No mock files found</div>';
                    return;
                }

                let html = '<div style="display: grid; gap: 10px;">';
                files.forEach(file => {
                    const fileSize = (file.size / 1024).toFixed(2);
                    const created = new Date(file.created).toLocaleString();

                    let infoDisplay = '';

                    // Display GraphQL info if available
                    if (file.graphqlInfo) {
                        const query = file.graphqlInfo.query || '';
                        const variables = file.graphqlInfo.variables;

                        // Truncate query for display (first 100 chars)
                        const queryPreview = query.length > 100 ? query.substring(0, 100) + '...' : query;
                        const escapedQuery = queryPreview.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');

                        let variablesDisplay = '';
                        if (variables) {
                            try {
                                const varsStr = JSON.stringify(variables, null, 2);
                                const varsPreview = varsStr.length > 150 ? varsStr.substring(0, 150) + '...' : varsStr;
                                const escapedVars = varsPreview.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
                                variablesDisplay = `<div style="font-size: 0.75em; color: #888; margin-top: 3px; word-break: break-all; font-family: monospace; background: rgba(0,0,0,0.05); padding: 4px 6px; border-radius: 4px;"><strong>Variables:</strong> ${escapedVars}</div>`;
                            } catch (e) {
                                // If variables can't be stringified, skip
                            }
                        }

                        infoDisplay = `
                            <div style="font-size: 0.75em; color: #888; margin-top: 3px; word-break: break-all; font-family: monospace; background: rgba(102, 126, 234, 0.1); padding: 4px 6px; border-radius: 4px;">
                                <strong style="color: #667eea;">🔷 GraphQL Query:</strong> ${escapedQuery}
                            </div>
                            ${variablesDisplay}
                        `;
                    } else {
                        // Display endpoint for REST API requests
                        const escapedEndpoint = file.endpoint ? file.endpoint.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;') : '';
                        infoDisplay = escapedEndpoint ? `<div style="font-size: 0.75em; color: #888; margin-top: 3px; word-break: break-all; font-family: monospace;">${escapedEndpoint}</div>` : '';
                    }

                    // Format filepath for display (make it relative if possible)
                    let displayPath = file.filePath || file.filename;
                    // Try to make path relative if it's an absolute path
                    displayPath = displayPath.replace(/^.*\/(mock-data|mockifyer)/, '$1');
                    const escapedPath = displayPath.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
                    
                    html += `
                        <div style="padding: 15px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #667eea; cursor: pointer;" 
                             onclick="viewMockFile('${file.filename}')"
                             onmouseover="this.style.background='#e9ecef'" 
                             onmouseout="this.style.background='#f8f9fa'">
                            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                                <div style="flex: 1; min-width: 0;">
                                    <strong style="color: #667eea; display: block; word-break: break-word;">📄 ${file.filename}</strong>
                                    ${infoDisplay}
                                    <div style="font-size: 0.75em; color: #999; margin-top: 3px; word-break: break-all; font-family: monospace; font-style: italic;">
                                        📂 ${escapedPath}
                                    </div>
                                    <div style="font-size: 0.9em; color: #666; margin-top: 5px; word-break: break-word;">
                                        Size: ${fileSize} KB • Created: ${created}
                                    </div>
                                </div>
                                <button onclick="event.stopPropagation(); deleteMockFile('${file.filename}')" 
                                        style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); padding: 6px 12px; font-size: 0.9em; white-space: nowrap; margin-left: 10px;">
                                    🗑️ Delete
                                </button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                listContainer.innerHTML = html;
            } catch (error) {
                listContainer.innerHTML = `<div style="padding: 10px; background: #ffebee; border-radius: 8px; color: #c62828;">Error loading files: ${error.message}</div>`;
            }
        }

        // View a specific mock file
        async function viewMockFile (filename) {
            const viewerContainer = document.getElementById('mock-file-viewer');
            viewerContainer.innerHTML = '<div style="padding: 10px;">Loading...</div>';

            try {
                const response = await fetch(`${API_BASE}/api/mocks/${encodeURIComponent(filename)}`);
                const data = await response.json();

                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(data.data, null, 2);
                pre.style.cssText = `
                    max-height: 500px;
                    overflow: auto;
                    background: #1e1e1e;
                    color: #d4d4d4;
                    padding: 15px;
                    border-radius: 8px;
                    font-family: 'Courier New', monospace;
                    font-size: 0.9em;
                    line-height: 1.5;
                    margin: 0;
                    border: 1px solid #3e3e3e;
                `;

                viewerContainer.innerHTML = `
                    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);">
                        <h3 style="color: white; margin: 0 0 10px 0; font-size: 1.2em;">📄 ${data.filename}</h3>
                        <div style="font-size: 0.9em; color: rgba(255, 255, 255, 0.9);">
                            Size: ${(data.metadata.size / 1024).toFixed(2)} KB • 
                            Created: ${new Date(data.metadata.created).toLocaleString()} • 
                            Modified: ${new Date(data.metadata.modified).toLocaleString()}
                        </div>
                    </div>
                `;
                viewerContainer.appendChild(pre);
            } catch (error) {
                viewerContainer.innerHTML = `<div style="padding: 10px; background: #ffebee; border-radius: 8px; color: #c62828;">Error loading file: ${error.message}</div>`;
            }
        }

        // Delete a mock file from the list
        async function deleteMockFile (filename) {
            try {
                const response = await fetch(`${API_BASE}/api/mocks/${encodeURIComponent(filename)}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (response.ok) {
                    // Show success message
                    const listContainer = document.getElementById('mock-files-list');
                    listContainer.innerHTML = `
                        <div style="padding: 10px; background: #c8e6c9; border-radius: 8px; color: #2e7d32; margin-bottom: 10px;">
                            ✅ Deleted: ${data.filename}
                        </div>
                    `;
                    // Reload the list
                    loadMockFiles();
                    // Clear viewer
                    document.getElementById('mock-file-viewer').innerHTML = '';
                } else {
                    alert(`Error: ${data.error || 'Failed to delete'}`);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Load status when page loads
        loadStatus();
        // Load mock files when page loads
        loadMockFiles();
    </script>
</body>

</html>

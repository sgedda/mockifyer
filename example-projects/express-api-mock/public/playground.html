<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockifyer Playground</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* Playground-specific styles */

        .response-container {
            margin-top: 20px;
            padding: 20px;
            background: rgba(20, 20, 35, 0.95);
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
            color: #e0e0e0;
        }

        .response-container.mocked {
            background: rgba(20, 20, 35, 0.95);
            border-left-color: #4caf50;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .response-container.real-api {
            background: rgba(20, 20, 35, 0.95);
            border-left-color: #ff9800;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
        }

        .response-container h3 {
            color: #8b9aff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .response-container pre {
            background: rgba(20, 20, 35, 0.8);
            color: #e0e0e0;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            border: 1px solid rgba(102, 126, 234, 0.2);
            margin-top: 15px;
            max-height: 600px;
            overflow-y: auto;
        }

        .response-container p {
            color: #e0e0e0;
            margin: 8px 0;
        }

        .response-container strong {
            color: #b8c5ff;
            font-weight: 600;
        }

        .mock-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.9em;
            font-weight: 700;
            margin-left: 10px;
            animation: pulse 2s infinite;
            box-shadow: 0 2px 8px rgba(17, 153, 142, 0.4);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.9;
                transform: scale(1.02);
            }
        }

        .real-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.9em;
            font-weight: 700;
            margin-left: 10px;
            box-shadow: 0 2px 8px rgba(245, 87, 108, 0.4);
        }

        .mock-info {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3) 0%, rgba(76, 175, 80, 0.2) 100%);
            padding: 18px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 5px solid #2e7d32;
            box-shadow: 0 2px 8px rgba(46, 125, 50, 0.2);
        }

        .mock-info h4 {
            color: #e8f5e9;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .mock-info p {
            color: #c8e6c9;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            font-weight: 500;
        }

        .mock-info code {
            color: #fff;
            background: rgba(0, 0, 0, 0.3);
        }

        .real-api-info {
            background: linear-gradient(135deg, #ffe0b2 0%, #ffcc80 100%);
            padding: 18px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 5px solid #f57c00;
            box-shadow: 0 2px 8px rgba(245, 124, 0, 0.2);
        }

        .real-api-info h4 {
            color: #3e2723;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .real-api-info p {
            color: #5d4037;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            font-weight: 500;
        }


        .loading.white {
            border: 3px solid rgba(255, 255, 255, .3);
            border-top-color: white;
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border-left-color: #f44336;
            color: #c62828;
        }

        .error h3 {
            color: #f44336;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-ok {
            background: #4caf50;
        }

        .status-error {
            background: #f44336;
        }

        .emoji {
            font-size: 1.2em;
        }

        .status-banner {
            background: rgba(30, 30, 46, 0.8);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-banner h2 {
            color: #8b9aff;
            margin: 0;
            font-size: 1.3em;
        }

        .status-banner .status-items {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
        }

        .status-item strong {
            color: #e0e0e0;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #e0e0e0;
            transition: opacity 0.2s;
        }

        .github-link:hover {
            opacity: 0.7;
        }

        .github-logo {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .status-value {
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .status-value.enabled {
            background: rgba(76, 175, 80, 0.3);
            color: #81c784;
        }

        .status-value.disabled {
            background: rgba(244, 67, 54, 0.3);
            color: #ef5350;
        }

        .status-value.recording {
            background: rgba(255, 152, 0, 0.3);
            color: #ffb74d;
        }

        /* Tablet Responsive Styles */
        @media (max-width: 1024px) {
            .status-banner {
                padding: 18px;
            }

            .status-banner .status-items {
                gap: 15px;
            }

            .response-container {
                padding: 18px;
            }
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            .card h2 {
                font-size: 1.2em;
                margin-bottom: 15px;
            }

            .status-banner {
                padding: 15px;
                margin-bottom: 20px;
                flex-direction: column;
                align-items: flex-start;
            }

            .status-banner h2 {
                font-size: 1.1em;
                margin-bottom: 10px;
            }

            .status-banner .status-items {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }

            .status-item {
                flex-wrap: wrap;
            }


            .response-container {
                padding: 15px;
                margin-top: 15px;
            }

            .response-container h3 {
                font-size: 1em;
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .mock-badge,
            .real-badge {
                margin-left: 0;
                margin-top: 5px;
                font-size: 0.85em;
                padding: 6px 12px;
            }

            .mock-info,
            .real-api-info {
                padding: 12px;
                font-size: 0.9em;
            }

            .mock-info h4,
            .real-api-info h4 {
                font-size: 1em;
            }

            .mock-info p,
            .real-api-info p {
                font-size: 0.85em;
                word-break: break-word;
            }


            /* Button containers - stack on mobile */
            .card>div[style*="display: flex"] {
                flex-direction: column;
            }

            .card>div[style*="display: flex"] button {
                width: 100%;
                margin-right: 0;
            }

            /* Mock files list mobile styles */
            #mock-files-list>div {
                gap: 8px;
            }

            #mock-files-list>div>div {
                padding: 12px !important;
            }

            #mock-files-list>div>div>div[style*="display: flex"] {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 12px !important;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div {
                width: 100%;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div>strong {
                display: block;
                word-break: break-all;
                font-size: 0.95em;
                line-height: 1.4;
                margin-bottom: 8px;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div>div {
                font-size: 0.85em;
                line-height: 1.5;
                word-break: break-word;
            }

            #mock-files-list>div>div>div[style*="display: flex"] button {
                width: auto;
                margin-top: 0;
                margin-left: 0 !important;
                padding: 4px 8px;
                font-size: 0.75em;
            }

            /* Mock file viewer mobile */
            #mock-file-viewer {
                margin-top: 15px;
            }

            #mock-file-viewer>div:first-child {
                padding: 12px !important;
                margin-bottom: 12px !important;
            }

            #mock-file-viewer h3 {
                font-size: 1em !important;
                margin-bottom: 8px !important;
                word-break: break-word;
            }

            #mock-file-viewer>div:first-child>div {
                font-size: 0.75em !important;
                line-height: 1.4 !important;
                word-break: break-word;
            }

            #mock-file-viewer pre {
                font-size: 0.75em;
                padding: 10px;
                max-height: 400px !important;
                overflow-x: auto;
                word-break: break-word;
                white-space: pre-wrap;
            }
        }

        @media (max-width: 480px) {
            .status-banner {
                padding: 12px;
            }

            .response-container {
                padding: 12px;
            }

            /* Mock file viewer - extra small screens */
            #mock-file-viewer h3 {
                font-size: 0.9em !important;
            }

            #mock-file-viewer>div:first-child>div {
                font-size: 0.7em !important;
            }

            #mock-file-viewer pre {
                font-size: 0.7em;
                padding: 8px;
                max-height: 300px !important;
            }

            /* Mock files list - extra small screens */
            #mock-files-list>div>div {
                padding: 10px !important;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div>strong {
                font-size: 0.9em;
            }

            #mock-files-list>div>div>div[style*="display: flex"]>div>div {
                font-size: 0.8em;
            }

            #mock-files-list>div>div>div[style*="display: flex"] button {
                padding: 10px 14px;
                font-size: 0.9em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="navigation-container"></div>

        <h1>🎭 Mockifyer Playground</h1>

        <!-- Header Links -->
        <div id="header-links-container"></div>

        <!-- Status Banner -->
        <div id="status-banner-container"></div>

        <!-- Client Configuration Card -->
        <div id="client-config-container"></div>

        <!-- Unified Endpoint Tester Card -->
        <div id="endpoint-tester-container"></div>

        <!-- Mock Files Browser Card -->
        <div id="mock-files-browser-container"></div>
    </div>

    <script src="navigation.js"></script>
    <script src="common.js"></script>
    <script>
        // Render navigation
        document.getElementById('navigation-container').innerHTML = renderNavigation('playground.html');

        const API_BASE = window.location.origin;

        // Helper function to load HTML fragments
        async function loadFragment (containerId, fragmentPath) {
            try {
                const response = await fetch(fragmentPath);
                const html = await response.text();
                const container = document.getElementById(containerId);
                if (container) {
                    container.innerHTML = html;
                }
            } catch (error) {
                console.error(`Error loading fragment ${fragmentPath}:`, error);
                const container = document.getElementById(containerId);
                if (container) {
                    container.innerHTML = `<div style="color: #f44336; padding: 10px;">Error loading fragment: ${fragmentPath}</div>`;
                }
            }
        }

        // Load all HTML fragments
        async function loadFragments () {
            await Promise.all([
                loadFragment('header-links-container', 'fragments/header-links.html'),
                loadFragment('status-banner-container', 'fragments/status-banner.html'),
                loadFragment('client-config-container', 'fragments/client-config.html'),
                loadFragment('endpoint-tester-container', 'fragments/endpoint-tester.html'),
                loadFragment('mock-files-browser-container', 'fragments/mock-files-browser.html')
            ]);

            // Initialize components after fragments are loaded
            initializeComponents();

            // Load status and mock files after fragments are loaded
            loadStatus();
            loadMockFiles();
        }

        // Initialize components after fragments are loaded
        function initializeComponents () {
            // Initialize client config dropdowns
            const clientTypeSelect = document.getElementById('client-type-select');
            const scopeSelect = document.getElementById('scope-select');

            if (clientTypeSelect) {
                clientTypeSelect.addEventListener('change', updateConfigDisplay);
            }
            if (scopeSelect) {
                scopeSelect.addEventListener('change', updateConfigDisplay);
            }

            // Initial display update
            updateConfigDisplay();

            // Initialize endpoint selector
            const endpointSelect = document.getElementById('endpoint-select');
            if (endpointSelect) {
                endpointSelect.addEventListener('change', renderEndpointForm);
                renderEndpointForm(); // Initial render
            }
        }

        // Load fragments when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadFragments);
        } else {
            loadFragments();
        }

        // Helper function to get current client configuration
        function getClientConfig () {
            const clientType = document.getElementById('client-type-select').value || 'axios';
            const scope = document.getElementById('scope-select').value || 'local';
            return { clientType, scope };
        }

        // Update display when dropdowns change
        function updateConfigDisplay () {
            const { clientType, scope } = getClientConfig();
            const display = document.getElementById('current-config-display');
            if (display) {
                display.textContent = `${clientType.charAt(0).toUpperCase() + clientType.slice(1)} + ${scope.charAt(0).toUpperCase() + scope.slice(1)}`;
            }
        }

        // Note: Initialization moved to initializeComponents() which is called after fragments load

        // Endpoint configurations
        const endpointConfigs = {
            'weather-current': {
                name: 'Current Weather',
                icon: '🌤️',
                apiPath: '/api/weather-unified/current',
                method: 'GET',
                fields: [
                    {
                        id: 'city',
                        label: 'City Name',
                        type: 'text',
                        placeholder: 'e.g., London, New York, Tokyo',
                        defaultValue: 'London',
                        required: true
                    },
                    {
                        id: 'full-response',
                        label: 'Show full API response',
                        type: 'checkbox',
                        defaultValue: false
                    }
                ],
                buildUrl: (params) => {
                    const city = encodeURIComponent(params.city || 'London');
                    const full = params['full-response'] ? '?full=true' : '';
                    return `${API_BASE}/api/weather-unified/current/${city}${full}`;
                },
                buildTitle: (params) => `Current Weather for ${params.city || 'Unknown'}`
            },
            'weather-forecast': {
                name: 'Weather Forecast',
                icon: '📅',
                apiPath: '/api/weather-unified/forecast',
                method: 'GET',
                fields: [
                    {
                        id: 'city',
                        label: 'City Name',
                        type: 'text',
                        placeholder: 'e.g., London, New York, Tokyo',
                        defaultValue: 'London',
                        required: true
                    },
                    {
                        id: 'days',
                        label: 'Number of Days',
                        type: 'select',
                        options: [
                            { value: '1', label: '1 day' },
                            { value: '2', label: '2 days' },
                            { value: '3', label: '3 days', selected: true },
                            { value: '5', label: '5 days' },
                            { value: '7', label: '7 days' }
                        ],
                        defaultValue: '3'
                    },
                    {
                        id: 'full-response',
                        label: 'Show full API response',
                        type: 'checkbox',
                        defaultValue: false
                    }
                ],
                buildUrl: (params) => {
                    const city = encodeURIComponent(params.city || 'London');
                    const days = params.days || '3';
                    const full = params['full-response'] ? '&full=true' : '';
                    return `${API_BASE}/api/weather-unified/forecast/${city}?days=${days}${full}`;
                },
                buildTitle: (params) => `${params.days || '3'}-Day Forecast for ${params.city || 'Unknown'}`
            },
            'football-fixtures': {
                name: 'Football Fixtures',
                icon: '⚽',
                apiPath: '/api/football/fixtures',
                method: 'GET',
                fields: [
                    {
                        id: 'season',
                        label: 'Season',
                        type: 'select',
                        options: [
                            { value: '2021', label: '2021' },
                            { value: '2022', label: '2022', selected: true },
                            { value: '2023', label: '2023' }
                        ],
                        defaultValue: '2022'
                    },
                    {
                        id: 'team',
                        label: 'Team (optional)',
                        type: 'select',
                        options: [
                            { value: '', label: 'Select a team...', selected: true },
                            { value: '33', label: 'Manchester United', group: 'Premier League' },
                            { value: '50', label: 'Manchester City', group: 'Premier League' },
                            { value: '40', label: 'Liverpool', group: 'Premier League' },
                            { value: '42', label: 'Arsenal', group: 'Premier League' },
                            { value: '49', label: 'Chelsea', group: 'Premier League' },
                            { value: '47', label: 'Tottenham', group: 'Premier League' },
                            { value: '66', label: 'Aston Villa', group: 'Premier League' },
                            { value: '51', label: 'Brighton', group: 'Premier League' }
                        ],
                        defaultValue: ''
                    }
                ],
                buildUrl: (params) => {
                    const season = params.season || '2022';
                    const team = params.team ? `&team=${params.team}` : '';
                    return `${API_BASE}/api/football/fixtures?season=${season}${team}`;
                },
                buildTitle: (params) => `Football Fixtures${params.season ? ` - Season ${params.season}` : ''}`
            },
            'football-standings': {
                name: 'League Standings',
                icon: '🏆',
                apiPath: '/api/football/standings',
                method: 'GET',
                fields: [
                    {
                        id: 'league',
                        label: 'League',
                        type: 'select',
                        options: [
                            { value: '39', label: 'Premier League (England)', selected: true },
                            { value: '140', label: 'La Liga (Spain)' },
                            { value: '78', label: 'Bundesliga (Germany)' },
                            { value: '135', label: 'Serie A (Italy)' },
                            { value: '61', label: 'Ligue 1 (France)' }
                        ],
                        defaultValue: '39'
                    },
                    {
                        id: 'season',
                        label: 'Season',
                        type: 'select',
                        options: [
                            { value: '2021', label: '2021' },
                            { value: '2022', label: '2022', selected: true },
                            { value: '2023', label: '2023' }
                        ],
                        defaultValue: '2022'
                    }
                ],
                buildUrl: (params) => {
                    const league = params.league || '39';
                    const season = params.season || '2022';
                    return `${API_BASE}/api/football/standings?league=${league}&season=${season}`;
                },
                buildTitle: (params) => `League Standings${params.season ? ` - Season ${params.season}` : ''}`
            },
            'football-team': {
                name: 'Team Information',
                icon: '👥',
                apiPath: '/api/football/team',
                method: 'GET',
                fields: [
                    {
                        id: 'team',
                        label: 'Team',
                        type: 'select',
                        options: [
                            { value: '33', label: 'Manchester United', group: 'Premier League', selected: true },
                            { value: '50', label: 'Manchester City', group: 'Premier League' },
                            { value: '40', label: 'Liverpool', group: 'Premier League' },
                            { value: '42', label: 'Arsenal', group: 'Premier League' },
                            { value: '49', label: 'Chelsea', group: 'Premier League' },
                            { value: '47', label: 'Tottenham', group: 'Premier League' }
                        ],
                        defaultValue: '33'
                    }
                ],
                buildUrl: (params) => {
                    const team = params.team || '33';
                    return `${API_BASE}/api/football/team/${team}`;
                },
                buildTitle: () => 'Team Information'
            },
            'graphql': {
                name: 'GraphQL Query',
                icon: '🔷',
                apiPath: '/api/graphql/query',
                method: 'POST',
                fields: [
                    {
                        id: 'query',
                        label: 'GraphQL Query',
                        type: 'textarea',
                        rows: 8,
                        placeholder: 'Enter your GraphQL query here...',
                        defaultValue: `query ($page: Int) {
  characters(page: $page) {
    results {
      id
      name
      status
      species
    }
  }
}`
                    },
                    {
                        id: 'variables',
                        label: 'Variables (JSON, optional)',
                        type: 'textarea',
                        rows: 3,
                        placeholder: '{"page": 1}',
                        defaultValue: '{"page": 3}'
                    }
                ],
                buildUrl: () => `${API_BASE}/api/graphql/query`,
                buildTitle: () => 'GraphQL Query Result',
                buildBody: (params) => ({
                    query: params.query,
                    variables: params.variables ? JSON.parse(params.variables) : {}
                })
            },
            'events': {
                name: 'Date-Filtered Events',
                icon: '📅',
                apiPath: '/api/events/filtered',
                method: 'GET',
                fields: [
                    {
                        id: 'filter',
                        label: 'Filter',
                        type: 'select',
                        options: [
                            { value: '', label: 'All Events', selected: true },
                            { value: 'upcoming', label: 'Upcoming Events' },
                            { value: 'past', label: 'Past Events' },
                            { value: 'today', label: "Today's Events" }
                        ],
                        defaultValue: ''
                    }
                ],
                buildUrl: (params) => {
                    const filter = params.filter ? `?filter=${params.filter}` : '';
                    return `${API_BASE}/api/events/filtered${filter}`;
                },
                buildTitle: (params) => {
                    const filterText = params.filter ? ` - ${params.filter.charAt(0).toUpperCase() + params.filter.slice(1)}` : '';
                    return `Date-Filtered Events${filterText}`;
                }
            }
        };

        // Render form fields based on selected endpoint
        function renderEndpointForm () {
            const endpointSelect = document.getElementById('endpoint-select');
            const formContainer = document.getElementById('endpoint-form-fields');
            const endpointNameDisplay = document.getElementById('selected-endpoint-name');

            if (!endpointSelect || !formContainer) return;

            const selectedEndpoint = endpointSelect.value;
            const config = endpointConfigs[selectedEndpoint];

            if (!config) return;

            // Update endpoint name display
            if (endpointNameDisplay) {
                endpointNameDisplay.textContent = `${config.icon} ${config.name}`;
            }

            // Clear form container
            formContainer.innerHTML = '';

            // Render form fields
            config.fields.forEach(field => {
                const formGroup = document.createElement('div');
                formGroup.className = 'form-group';

                if (field.type === 'checkbox') {
                    const label = document.createElement('label');

                    label.textContent = field.label;
                    label.setAttribute('for', `endpoint-field-${field.id}`);

                    const select = document.createElement('select');
                    select.id = `endpoint-field-${field.id}`;
                    select.style.cssText = 'width: 100%; padding: 12px; border: 2px solid rgba(102, 126, 234, 0.3); border-radius: 8px; background: rgba(20, 20, 35, 0.8); color: #e0e0e0; font-size: 14px; cursor: pointer;';

                    // Group options if needed
                    const groups = {};
                    field.options.forEach(opt => {
                        if (opt.group) {
                            if (!groups[opt.group]) {
                                groups[opt.group] = [];
                            }
                            groups[opt.group].push(opt);
                        } else {
                            if (!groups['_default']) {
                                groups['_default'] = [];
                            }
                            groups['_default'].push(opt);
                        }
                    });

                    Object.keys(groups).forEach(groupName => {
                        if (groupName !== '_default') {
                            const optgroup = document.createElement('optgroup');
                            optgroup.label = groupName;
                            groups[groupName].forEach(opt => {
                                const option = document.createElement('option');
                                option.value = opt.value;
                                option.textContent = opt.label;
                                if (opt.selected) option.selected = true;
                                optgroup.appendChild(option);
                            });
                            select.appendChild(optgroup);
                        } else {
                            groups[groupName].forEach(opt => {
                                const option = document.createElement('option');
                                option.value = opt.value;
                                option.textContent = opt.label;
                                if (opt.selected) option.selected = true;
                                select.appendChild(option);
                            });
                        }
                    });

                    formGroup.appendChild(label);
                    formGroup.appendChild(select);
                } else {
                    // Text input
                    const label = document.createElement('label');
                    label.textContent = field.label;
                    label.setAttribute('for', `endpoint-field-${field.id}`);

                    const input = document.createElement('input');
                    input.type = field.type || 'text';
                    input.id = `endpoint-field-${field.id}`;
                    input.placeholder = field.placeholder || '';
                    input.value = field.defaultValue || '';
                    input.required = field.required || false;
                    input.style.cssText = 'width: 100%; padding: 12px; border: 2px solid rgba(102, 126, 234, 0.3); border-radius: 8px; background: rgba(20, 20, 35, 0.8); color: #e0e0e0; font-size: 14px;';

                    // Add Enter key support for text inputs
                    if (field.type === 'text') {
                        input.addEventListener('keypress', (e) => {

                                executeEndpointRequest();
                            }
                        });
                    }

                    formGroup.appendChild(label);
                    formGroup.appendChild(input);
                }

                formContainer.appendChild(formGroup);
            });
        }

        // Unified endpoint request handler
        async function executeEndpointRequest () {
            const endpointSelect = document.getElementById('endpoint-select');
            const executeButton = document.getElementById('execute-button');
            const responseContainer = document.getElementById('unified-response');

            if (!endpointSelect || !responseContainer) return;

            const selectedEndpoint = endpointSelect.value;
            const config = endpointConfigs[selectedEndpoint];

            if (!config) {
                alert('Invalid endpoint selected');
                return;
            }

            // Collect form values
            const params = {};
            config.fields.forEach(field => {
                const fieldElement = document.getElementById(`endpoint-field-${field.id}`);
                if (fieldElement) {
                    if (field.type === 'checkbox') {
                        params[field.id] = fieldElement.checked;
                    } else {
                        params[field.id] = fieldElement.value;
                    }
                }
            });

            // Validate required fields
            const requiredFields = config.fields.filter(f => f.required);
            for (const field of requiredFields) {
                if (!params[field.id] || params[field.id].trim() === '') {
                    alert(`Please fill in the required field: ${field.label}`);
                    return;
                }
            }

            // Disable button and show loading
            if (executeButton) {
                executeButton.disabled = true;
                executeButton.innerHTML = '<span class="loading"></span> Loading...';
            }

            try {
                const url = config.buildUrl(params);
                const title = config.buildTitle(params);

                let options = {
                    method: config.method || 'GET'
                };

                // Add body for POST requests
                if (config.method === 'POST' && config.buildBody) {
                    options.headers = {
                        'Content-Type': 'application/json'
                    };
                    options.body = JSON.stringify(config.buildBody(params));
                }

                const result = await makeRequest(url, options);

                // Add endpoint info to result
                result.endpointName = `${config.icon} ${config.name}`;
                result.endpointId = selectedEndpoint;

                displayResponse('unified-response', result, title);

                // Refresh mock files list in case a new mock was created
                if (result.success) {
                    loadMockFiles();
                }
            } catch (error) {
                displayResponse('unified-response', {
                    success: false,
                    error: error.message,
                    isMocked: false,
                    endpointName: `${config.icon} ${config.name}`,
                    endpointId: selectedEndpoint
                }, 'Request Error');
            } finally {
                if (executeButton) {
                    executeButton.disabled = false;
                    executeButton.textContent = 'Execute Request';
                }
            }
        }

        async function makeRequest (url, options = {}) {
            const startTime = performance.now();
            try {
                // Add clientType and scope query parameters to the URL
                const { clientType, scope } = getClientConfig();
                const urlObj = new URL(url);
                urlObj.searchParams.set('clientType', clientType);
                urlObj.searchParams.set('scope', scope);
                const finalUrl = urlObj.toString();

                const response = await fetch(finalUrl, options);
                const endTime = performance.now();
                const responseTime = Math.round(endTime - startTime);
                const data = await response.json();
                // Check for mock header (case-insensitive)
                const mockHeader = response.headers.get('x-mockifyer') ||
                    response.headers.get('X-Mockifyer') ||
                    response.headers.get('X-MOCKIFYER');
                const isMocked = mockHeader === 'true';

                console.log('[Dashboard] Response headers:', Object.fromEntries(response.headers.entries()));
                console.log('[Dashboard] Mock header value:', mockHeader);
                console.log('[Dashboard] Is mocked:', isMocked);

                // Extract client configuration from headers (use different variable names to avoid conflict)
                const responseClientType = response.headers.get('x-client-type') || 'axios';
                const responseScope = response.headers.get('x-scope') || 'local';

                return {
                    success: response.ok,
                    data,
                    status: response.status,
                    headers: Object.fromEntries(response.headers.entries()),
                    isMocked: isMocked,
                    mockTimestamp: response.headers.get('x-mockifyer-timestamp') || response.headers.get('X-Mockifyer-Timestamp'),
                    mockFilename: response.headers.get('x-mockifyer-filename') || response.headers.get('X-Mockifyer-Filename'),
                    mockFilepath: response.headers.get('x-mockifyer-filepath') || response.headers.get('X-Mockifyer-Filepath'),
                    responseTime: responseTime,
                    clientType: responseClientType,
                    scope: responseScope
                };
            } catch (error) {
                return {
                    success: false,
                    error: error.message,
                    isMocked: false
                };
            }
        }

            responseDiv.className = `response-container ${containerClass}`;

            const titleEl = document.createElement('h3');
            const statusText = result.isMocked
                ? '<span class="mock-badge">🎭 USING MOCK DATA</span>'
                : '<span class="real-badge">🌐 REAL API CALL</span>';

            // Add endpoint info if available
            const endpointInfo = result.endpointName

                : '';

            titleEl.innerHTML = `

                ${title}
                ${endpointInfo}
                ${statusText}
            `;
            titleEl.style.fontSize = '1.3em';
            titleEl.style.marginBottom = '20px';

            const banner = document.createElement('div');

            let mockMessage = '🎭 This response came from MOCK DATA - No external API call was made!';

            if (result.clientType && result.scope) {
                const clientDisplay = result.clientType.charAt(0).toUpperCase() + result.clientType.slice(1);
                const scopeDisplay = result.scope.charAt(0).toUpperCase() + result.scope.slice(1);

            }

            if (result.success) {
                if (result.isMocked && result.mockTimestamp) {
                    const mockInfo = document.createElement('div');

                    let fileInfo = '';
                    if (result.mockFilename) {

                        let displayPath = result.mockFilepath || result.mockFilename;

                        `;

                        <p><strong>📅 Mock Created:</strong> ${new Date(result.mockTimestamp).toLocaleString()}</p>
                        <p><strong>⚡ Response Time:</strong> ${result.responseTime}ms (mocked - instant!)</p>
                        <p><strong>✅ Status Code:</strong> ${result.status}</p>
                        <p><strong>💾 Source:</strong> Mock data file</p>

                    `;

                } else {
                    const realInfo = document.createElement('div');
                    realInfo.className = 'real-api-info';
                    realInfo.innerHTML = `
                        <h4>🌐 Real API Call Information - Using External API</h4>
                        <p><strong>⏱️ Response Time:</strong> ${result.responseTime}ms</p>
                        <p><strong>✅ Status Code:</strong> ${result.status}</p>

                responseDiv.appendChild(errorDiv);

                const listResponse = await fetch(`${API_BASE}/api/mocks`);
                const listData = await listResponse.json();
                const files = listData.files || [];

                // Search through mock files to find a match
                for (const file of files) {
                    try {
                        const fileResponse = await fetch(`${API_BASE}/api/mocks/${encodeURIComponent(file.filename)}`);
                        const fileData = await fileResponse.json();

                        if (!fileData.data || !fileData.data.request) continue;

                        const request = fileData.data.request;
                        const url = request.url || '';
                        const queryParams = request.queryParams || {};

                        // Check if this is the right endpoint type
                        const isCurrentWeather = endpointType === 'current' && url.includes('/current.json');
                        const isForecast = endpointType === 'forecast' && url.includes('/forecast.json');

                        if (!isCurrentWeather && !isForecast) continue;

                        // Check if city matches (case-insensitive)
                        const mockCity = queryParams.q;
                        if (!mockCity || mockCity.toLowerCase() !== city.toLowerCase()) continue;

                        // For forecast, check if days match (if specified)
                        if (endpointType === 'forecast' && days !== null) {
                            const mockDays = queryParams.days;
                            if (mockDays !== days.toString()) continue;
                        }

                        // Found a match!
                        return file.filename;
                    } catch (error) {
                        // Skip files that can't be read
                        console.warn(`[DeleteMock] Could not read file ${file.filename}:`, error);
                        continue;
                    }
                }

                return null; // No match found
            } catch (error) {
                console.error('[DeleteMock] Error finding mock file:', error);
                throw error;
            }
        }

        async function executeGraphQLQuery () {
            const button = event.target;
            const query = document.getElementById('graphql-query-input').value.trim();
            const variablesText = document.getElementById('graphql-variables-input').value.trim();

            if (!query) {
                alert('Please enter a GraphQL query');
                return;
            }

            let variables = {};
            if (variablesText) {
                try {
                    variables = JSON.parse(variablesText);
                } catch (error) {
                    alert('Invalid JSON in variables field. Please check your syntax.');
                    return;
                }
            }

            button.disabled = true;
            button.innerHTML = '<span class="loading"></span> Loading...';

            try {
                const result = await makeRequest(`${API_BASE}/api/graphql/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query, variables })
                });
                displayResponse('graphql-response', result, 'GraphQL Query Result');
                if (result.success) {
                    loadMockFiles();
                }
            } catch (error) {
                displayResponse('graphql-response', {
                    success: false,
                    error: error.message,
                    isMocked: false
                }, 'GraphQL Query Error');

        // Load and display mock files
        async function loadMockFiles () {

                return;
            }

            listContainer.innerHTML = '<div style="padding: 10px; color: #e0e0e0;">Loading...</div>';

            try {
                const response = await fetch(`${API_BASE}/api/mocks`);
                const data = await response.json();
                const files = data.files || [];
                const mockDataPath = data.mockDataPath || '';

                if (files.length === 0) {
                    listContainer.innerHTML = '<div style="padding: 10px; color: #666;">No mock files found</div>';
                    return;
                }

                let html = '<div style="display: grid; gap: 8px;">';
                files.forEach(file => {
                    const fileSize = (file.size / 1024).toFixed(2);
                    const created = new Date(file.created).toLocaleString();

                    let infoDisplay = '';

                    // Display GraphQL info if available
                    if (file.graphqlInfo) {
                        const query = file.graphqlInfo.query || '';
                        const variables = file.graphqlInfo.variables;

                        // Truncate query for display (first 100 chars)
                        const queryPreview = query.length > 100 ? query.substring(0, 100) + '...' : query;
                        const escapedQuery = queryPreview.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');

                        let variablesDisplay = '';
                        if (variables) {
                            try {
                                const varsStr = JSON.stringify(variables, null, 2);
                                const varsPreview = varsStr.length > 150 ? varsStr.substring(0, 150) + '...' : varsStr;
                                const escapedVars = varsPreview.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
                                variablesDisplay = `<div style="font-size: 0.75em; color: #888; margin-top: 3px; word-break: break-all; font-family: monospace; background: rgba(0,0,0,0.05); padding: 4px 6px; border-radius: 4px;"><strong>Variables:</strong> ${escapedVars}</div>`;
                            } catch (e) {
                                // If variables can't be stringified, skip
                            }
                        }

                        infoDisplay = `
                            <div style="font-size: 0.75em; color: #888; margin-top: 3px; word-break: break-all; font-family: monospace; background: rgba(102, 126, 234, 0.1); padding: 4px 6px; border-radius: 4px;">
                                <strong style="color: #667eea;">🔷 GraphQL Query:</strong> ${escapedQuery}
                            </div>
                            ${variablesDisplay}
                        `;
                    } else {
                        // Display endpoint for REST API requests
                        const escapedEndpoint = file.endpoint ? file.endpoint.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;') : '';
                        infoDisplay = escapedEndpoint ? `<div style="font-size: 0.75em; color: #888; margin-top: 3px; word-break: break-all; font-family: monospace;">${escapedEndpoint}</div>` : '';
                    }

                    // Format filepath for display (make it relative to the configured mock data path)
                    let displayPath = file.filePath || file.filename;
                    // If we have the mockDataPath from backend, use it to make the path relative
                    if (mockDataPath && displayPath.startsWith(mockDataPath)) {
                        displayPath = displayPath.substring(mockDataPath.length).replace(/^[/\\]+/, '');
                        // If the path contains 'persisted', preserve that part
                        if (mockDataPath.includes('persisted')) {
                            displayPath = 'persisted/' + displayPath;
                        }
                    } else {
                        // Fallback: try to find the actual directory structure
                        const patterns = ['persisted/mock-data', 'mock-data'];
                        let found = false;
                        for (const pattern of patterns) {
                            const index = displayPath.indexOf(pattern);
                            if (index !== -1) {
                                displayPath = displayPath.substring(index);
                                found = true;
                                break;
                            }
                        }
                        // If no pattern found, try to extract just the filename and directory
                        if (!found) {
                            const parts = displayPath.split(/[/\\]/);
                            const filename = parts[parts.length - 1];
                            const dir = parts[parts.length - 2] || 'mock-data';
                            displayPath = `${dir}/${filename}`;
                        }
                    }
                    const escapedPath = displayPath.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');

                    html += `

                             onmouseout="this.style.background='rgba(30, 30, 46, 0.6)'">

                                <div style="flex: 1; min-width: 0;">
                                    <strong style="color: #8b9aff; display: block; word-break: break-word; font-size: 0.95em; margin-bottom: 4px;">📄 ${file.filename}</strong>
                                    ${infoDisplay}
                                    <div style="font-size: 0.7em; color: #999; margin-top: 4px; word-break: break-all; font-family: monospace; font-style: italic;">
                                        📂 ${escapedPath}
                                    </div>
                                    <div style="font-size: 0.8em; color: #aaa; margin-top: 4px; word-break: break-word;">
                                        ${fileSize} KB • ${created}
                                    </div>
                                </div>
                                <div style="display: flex; gap: 4px; flex-shrink: 0; align-items: flex-start;">
                                    <button onclick="event.stopPropagation(); editMockFile('${file.filename}')" 
                                            style="background: transparent; color: #667eea; border: 1px solid #667eea; padding: 6px 8px; font-size: 1em; white-space: nowrap; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;"

                                        ✏️

                                            style="background: transparent; color: #dc3545; border: 1px solid #dc3545; padding: 6px 8px; font-size: 1em; white-space: nowrap; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;"

                                        🗑️
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                listContainer.innerHTML = html;
            } catch (error) {

                        saveButton.style.opacity = '0.5';
                        return false;
                    }
                }

                // Initial validation
                validateJSON(textarea.value, errorDiv);

                // Save handler
                saveButton.addEventListener('click', async () => {
                    const jsonContent = textarea.value.trim();

                    if (!validateJSON(jsonContent, errorDiv)) {
                        return;
                    }

                    try {
                        // Parse the response data (can be any valid JSON)
                        let parsedResponseData;
                        if (!jsonContent.trim()) {
                            // Empty string means empty object/array - use empty array as default
                            parsedResponseData = [];
                        } else {
                            parsedResponseData = JSON.parse(jsonContent);
                        }

                        saveButton.disabled = true;
                        saveButton.textContent = '💾 Saving...';

                        const saveResponse = await fetch(`${API_BASE}/api/mocks/${encodeURIComponent(filename)}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ responseData: parsedResponseData })
                        });

                        const saveData = await saveResponse.json();

                        if (saveResponse.ok) {
                            // Show success
                            errorDiv.textContent = '✅ File saved successfully!';
                            errorDiv.style.display = 'block';
                            errorDiv.style.background = '#c8e6c9';
                            errorDiv.style.color = '#2e7d32';

                            // Close modal after a short delay
                            setTimeout(() => {
                                // Restore body scrolling
                                document.body.style.overflow = originalBodyOverflow;
                                document.body.removeChild(modal);
                                loadMockFiles();
                                // Reload the viewer if it's showing this file
                                viewMockFile(filename);
                            }, 1000);
                        } else {
                            errorDiv.textContent = `❌ Error: ${saveData.error || saveData.details || 'Failed to save'}`;
                            errorDiv.style.display = 'block';
                            errorDiv.style.background = '#ffebee';
                            errorDiv.style.color = '#c62828';
                            saveButton.disabled = false;
                            saveButton.textContent = '💾 Save Changes';
                        }
                    } catch (e) {
                        errorDiv.textContent = `❌ Error: ${e.message}`;
                        errorDiv.style.display = 'block';
                        errorDiv.style.background = '#ffebee';
                        errorDiv.style.color = '#c62828';
                        saveButton.disabled = false;
                        saveButton.textContent = '💾 Save Changes';
                    }
                });

                // Cancel/Close handlers
                const closeModal = () => {
                    clearTimeout(resizeTimeout);
                    window.removeEventListener('resize', resizeHandler);
                    // Restore body scrolling
                    document.body.style.overflow = originalBodyOverflow;
                    document.body.removeChild(modal);
                };

                cancelButton.addEventListener('click', closeModal);
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        closeModal();
                    }
                });

                // Escape key to close
                const escapeHandler = (e) => {
                    if (e.key === 'Escape') {
                        closeModal();
                        document.removeEventListener('keydown', escapeHandler);
                    }
                };
                document.addEventListener('keydown', escapeHandler);
            } catch (error) {
                alert(`Error loading file for editing: ${error.message}`);
            }
        }

        // Delete a mock file from the list
        async function deleteMockFile (filename) {
            try {
                const response = await fetch(`${API_BASE}/api/mocks/${encodeURIComponent(filename)}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (response.ok) {
                    // Show success message
                    const listContainer = document.getElementById('mock-files-list');
                    listContainer.innerHTML = `
                        <div style="padding: 10px; background: #c8e6c9; border-radius: 8px; color: #2e7d32; margin-bottom: 10px;">
                            ✅ Deleted: ${data.filename}
                        </div>
                    `;
                    // Reload the list
                    loadMockFiles();
                    // Clear viewer
                    document.getElementById('mock-file-viewer').innerHTML = '';
                } else {
                    alert(`Error: ${data.error || 'Failed to delete'}`);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Note: loadStatus() and loadMockFiles() are now called after fragments are loaded
        // in the loadFragments() function to ensure elements exist
    </script>
</body>

</html>

<!-- Client Configuration Card -->
<div class="card"
    style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(139, 154, 255, 0.1) 100%); border: 2px solid rgba(102, 126, 234, 0.3); margin-bottom: 30px;">
    <h2>⚙️ Request Configuration</h2>
    <p style="color: #aaa; margin-bottom: 20px; font-size: 0.95em;">
        Choose the HTTP client type and scope for all requests made from the playground below.
    </p>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
        <div class="form-group">
            <label for="client-type-select"
                style="font-weight: 600; color: #8b9aff; margin-bottom: 8px; display: block;">
                HTTP Client Type:
            </label>
            <select id="client-type-select"
                style="width: 100%; padding: 12px; border: 2px solid rgba(102, 126, 234, 0.3); border-radius: 8px; background: rgba(20, 20, 35, 0.8); color: #e0e0e0; font-size: 14px; cursor: pointer;">
                <option value="axios">Axios</option>
                <option value="fetch">Fetch</option>
            </select>
        </div>
        <div class="form-group">
            <label for="scope-select" style="font-weight: 600; color: #8b9aff; margin-bottom: 8px; display: block;">
                Scope:
            </label>
            <select id="scope-select"
                style="width: 100%; padding: 12px; border: 2px solid rgba(102, 126, 234, 0.3); border-radius: 8px; background: rgba(20, 20, 35, 0.8); color: #e0e0e0; font-size: 14px; cursor: pointer;">
                <option value="local">Local (HTTP Client Instance)</option>
                <option value="global">Global (Patched Global)</option>
            </select>
        </div>
    </div>
    <div
        style="margin-top: 15px; padding: 12px; background: rgba(102, 126, 234, 0.1); border-radius: 8px; border-left: 4px solid rgba(102, 126, 234, 0.5);">
        <p style="margin: 0; color: #b8c5ff; font-size: 0.9em;">
            <strong>Current Selection:</strong>
            <span id="current-config-display" style="font-family: 'Courier New', monospace; color: #fff;">Axios
                + Local</span>
        </p>
    </div>
</div>

<!-- Unified Endpoint Tester Card -->
<div class="card">
    <h2>🚀 API Endpoint Tester</h2>
    <p style="color: #aaa; margin-bottom: 20px; font-size: 0.95em;">
        Select an endpoint to test and configure the request parameters below. All requests will use the client
        configuration selected above.
    </p>

    <!-- Endpoint Selection -->
    <div class="form-group">
        <label for="endpoint-select" style="font-weight: 600; color: #8b9aff; margin-bottom: 8px; display: block;">
            Select Endpoint:
        </label>
        <select id="endpoint-select"
            style="width: 100%; padding: 12px; border: 2px solid rgba(102, 126, 234, 0.3); border-radius: 8px; background: rgba(20, 20, 35, 0.8); color: #e0e0e0; font-size: 14px; cursor: pointer;">
            <option value="weather-current">🌤️ Current Weather</option>
            <option value="weather-forecast">📅 Weather Forecast</option>
            <option value="football-fixtures">⚽ Football Fixtures</option>
            <option value="football-standings">🏆 League Standings</option>
            <option value="football-team">👥 Team Information</option>
            <option value="graphql">🔷 GraphQL Query</option>
            <option value="events">📅 Date-Filtered Events</option>
        </select>
    </div>

    <!-- Selected Endpoint Display -->
    <div id="selected-endpoint-display"
        style="margin-top: 15px; padding: 12px; background: rgba(102, 126, 234, 0.1); border-radius: 8px; border-left: 4px solid rgba(102, 126, 234, 0.5);">
        <p style="margin: 0; color: #b8c5ff; font-size: 0.9em;">
            <strong>Selected:</strong> <span id="selected-endpoint-name"
                style="font-family: 'Courier New', monospace; color: #fff;">Current Weather</span>
        </p>
    </div>

    <!-- Dynamic Form Fields Container -->
    <div id="endpoint-form-fields" style="margin-top: 20px;">
        <!-- Form fields will be dynamically rendered here -->
    </div>

    <!-- Action Buttons -->
    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px;">
        <button onclick="executeEndpointRequest()" id="execute-button">Execute Request</button>
        <button onclick="deleteEndpointMock()"
            style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);">Delete Mock</button>
    </div>
    <div id="delete-endpoint-message" style="margin-top: 10px;"></div>

    <!-- Response Container -->
    <div id="unified-response" style="margin-top: 20px;"></div>
</div>

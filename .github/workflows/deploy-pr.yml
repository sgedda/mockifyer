name: Deploy PR to Railway

on:
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
            - main # Only trigger for PRs targeting main (adjust as needed)

jobs:
    deploy:
        name: Deploy PR to Railway
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.ref }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: mockifyer-web/node_modules
                  key: ${{ runner.os }}-npm-${{ hashFiles('mockifyer-web/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-npm-

            - name: Install dependencies
              working-directory: mockifyer-web
              run: npm ci

            - name: Build
              working-directory: mockifyer-web
              run: npm run build

            - name: Install Railway CLI
              run: npm install -g @railway/cli

            - name: Deploy to Railway
              working-directory: mockifyer-web
              env:
                  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
              run: |
                  railway up --service ${{ secrets.RAILWAY_SERVICE_ID }}

name: Deploy PR to Railway

on:
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
            - main # Only trigger for PRs targeting main (adjust as needed)

jobs:
    deploy:
        name: Deploy PR to Railway
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.ref }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Prepare production configuration
              working-directory: mockifyer-web
              run: |
                  echo "Copying production configuration files"
                  cp package.prod.json package.json
                  cp tsconfig.prod.json tsconfig.json
                  echo "Removing lockfiles (as per package.prod.json preinstall)"
                  rm -f package-lock.json package-lock.prod.json || true

            - name: Setup npm authentication for GitHub Packages
              working-directory: mockifyer-web
              run: |
                  echo '@sgedda:registry=https://npm.pkg.github.com' > .npmrc
                  echo '//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}' >> .npmrc

            - name: Generate package-lock.json for Railway
              working-directory: mockifyer-web
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  npm install --package-lock-only --legacy-peer-deps || echo "Lockfile generation completed (warnings OK)"

            - name: Install Railway CLI
              run: npm install -g @railway/cli

            - name: Verify Railway token
              env:
                  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
              run: |
                  if [ -z "$RAILWAY_TOKEN" ]; then
                      echo "Error: RAILWAY_TOKEN is not set"
                      exit 1
                  fi
                  echo "RAILWAY_TOKEN is set"
                  railway --version || echo "Railway CLI version check failed"

            - name: Deploy to Railway
              working-directory: mockifyer-web
              env:
                  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
                  CI: "true"
              run: |
                  railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --ci

            - name: Get and Print Railway Service URL
              working-directory: mockifyer-web
              env:
                  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
              run: |
                  echo "Fetching Railway service URL..."

                  SERVICE_URL=""
                  DOMAIN_OUTPUT=""

                  # Try railway domain command - it may generate or display existing domain
                  # Try with --service flag first (if supported), then without
                  if [ -n "${{ secrets.RAILWAY_SERVICE_ID }}" ]; then
                      DOMAIN_OUTPUT=$(railway domain --service ${{ secrets.RAILWAY_SERVICE_ID }} 2>&1 || echo "")
                  fi

                  # If that didn't work, try without service flag (uses linked service)
                  if [ -z "$DOMAIN_OUTPUT" ] || echo "$DOMAIN_OUTPUT" | grep -qi "error\|not found\|invalid"; then
                      DOMAIN_OUTPUT=$(railway domain 2>&1 || echo "")
                  fi

                  # Extract URL from domain output (handles various formats)
                  if [ -n "$DOMAIN_OUTPUT" ]; then
                      # Check for full URL with https://
                      if echo "$DOMAIN_OUTPUT" | grep -q "https://"; then
                          SERVICE_URL=$(echo "$DOMAIN_OUTPUT" | grep -oE 'https://[^\s<>"]+' | head -1 | tr -d '"' | tr -d "'")
                      # Check for railway.app domain pattern (without https://)
                      elif echo "$DOMAIN_OUTPUT" | grep -qE '[a-zA-Z0-9-]+\.[a-zA-Z0-9-]+\.railway\.app'; then
                          DOMAIN=$(echo "$DOMAIN_OUTPUT" | grep -oE '[a-zA-Z0-9-]+\.[a-zA-Z0-9-]+\.railway\.app' | head -1)
                          SERVICE_URL="https://$DOMAIN"
                      fi
                  fi

                  # Use hardcoded URL as fallback or primary display
                  HARDCODED_URL="https://mockifyer-dev-production.up.railway.app/"
                  
                  # Output results
                  echo ""
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "✅ Deployment successful!"
                  
                  if [ -n "$SERVICE_URL" ]; then
                      echo "🌐 Railway Service URL (detected): $SERVICE_URL"
                      echo "🌐 Railway Service URL (hardcoded): $HARDCODED_URL"
                      FINAL_URL="$SERVICE_URL"
                  else
                      echo "🌐 Railway Service URL: $HARDCODED_URL"
                      FINAL_URL="$HARDCODED_URL"
                  fi
                  
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo ""
                  
                  # Create a GitHub Actions notice for better visibility in workflow summary
                  echo "::notice title=🚀 Deployment URL::$FINAL_URL"
                  
                  if [ -n "$DOMAIN_OUTPUT" ] && [ -z "$SERVICE_URL" ]; then
                      echo ""
                      echo "Domain command output for debugging:"
                      echo "$DOMAIN_OUTPUT"
                  fi

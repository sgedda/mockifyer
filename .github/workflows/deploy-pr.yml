name: Deploy PR to Railway

on:
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
            - main # Only trigger for PRs targeting main (adjust as needed)

jobs:
    deploy:
        name: Deploy PR to Railway
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.ref }}

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"

            - name: Prepare production configuration
              working-directory: mockifyer-web
              run: |
                  echo "Copying production configuration files"
                  cp package.prod.json package.json
                  cp tsconfig.prod.json tsconfig.json
                  echo "Removing lockfiles (as per package.prod.json preinstall)"
                  rm -f package-lock.json package-lock.prod.json || true

            - name: Setup npm authentication for GitHub Packages
              working-directory: mockifyer-web
              run: |
                  echo '@sgedda:registry=https://npm.pkg.github.com' > .npmrc
                  echo '//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}' >> .npmrc

            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: mockifyer-web/node_modules
                  key: ${{ runner.os }}-npm-prod-${{ hashFiles('mockifyer-web/package.prod.json') }}
                  restore-keys: |
                      ${{ runner.os }}-npm-prod-

            - name: Install dependencies
              working-directory: mockifyer-web
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npm install --legacy-peer-deps

            - name: Build
              working-directory: mockifyer-web
              run: npm run build

            - name: Install Railway CLI
              run: npm install -g @railway/cli

            - name: Deploy to Railway
              working-directory: mockifyer-web
              env:
                  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
              run: |
                  railway up --service ${{ secrets.RAILWAY_SERVICE_ID }}

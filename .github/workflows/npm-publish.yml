name: Publish Packages to npm

on:
  push:
    tags:
      - "v*"

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

  publish:
    name: Publish to npm
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build

      # Convert file: references to published versions before publishing
      - name: Prepare packages for publishing
        run: node packages/prepare-for-publish.js

      # Extract version from tag
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Generate changelog from git log
      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            # If no previous tag exists, get all commits
            CHANGELOG=$(git log --pretty=format:"* %s (%h)")
          else
            # Get commits since last tag
            CHANGELOG=$(git log --pretty=format:"* %s (%h)" $PREVIOUS_TAG..HEAD)
          fi
          # Properly escape the changelog for GitHub Actions output
          echo "CHANGELOG<<delimiter" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "delimiter" >> $GITHUB_OUTPUT

      # Create GitHub Release
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false

      # Publish packages to npm in correct order
      - name: Publish mockifyer-core
        working-directory: packages/mockifyer-core
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mockifyer-axios
        working-directory: packages/mockifyer-axios
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mockifyer-fetch
        working-directory: packages/mockifyer-fetch
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mockifyer-dashboard
        working-directory: packages/mockifyer-dashboard
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Note: mockifyer-test-helper is skipped for now

      # Notify on success
      - name: Notify on success
        if: success()
        run: |
          echo "🎉 Successfully published version ${{ steps.get_version.outputs.VERSION }} to npm!"
          echo "📦 Packages:"
          echo "  - @sgedda/mockifyer-core: https://www.npmjs.com/package/@sgedda/mockifyer-core"
          echo "  - @sgedda/mockifyer-axios: https://www.npmjs.com/package/@sgedda/mockifyer-axios"
          echo "  - @sgedda/mockifyer-fetch: https://www.npmjs.com/package/@sgedda/mockifyer-fetch"
          echo "  - @sgedda/mockifyer-dashboard: https://www.npmjs.com/package/@sgedda/mockifyer-dashboard"
          echo "⏭️  Skipped: @sgedda/mockifyer-test-helper"
          echo "📝 Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.get_version.outputs.VERSION }}"

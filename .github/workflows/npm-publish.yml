name: Publish Packages to npm and GitHub Packages

on:
  push:
    tags:
      - "core-v*"
      - "axios-v*"
      - "fetch-v*"

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

  publish:
    name: Publish to npm and GitHub Packages
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build

      # Convert file: references to published versions before publishing
      - name: Prepare packages for publishing
        run: node packages/prepare-for-publish.js

      # Determine which package to publish based on the tag prefix
      - name: Resolve package from tag
        id: resolve_pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          case "$TAG" in
            core-v*)  echo "PKG_DIR=packages/mockifyer-core"  >> $GITHUB_OUTPUT ;;
            axios-v*) echo "PKG_DIR=packages/mockifyer-axios" >> $GITHUB_OUTPUT ;;
            fetch-v*) echo "PKG_DIR=packages/mockifyer-fetch" >> $GITHUB_OUTPUT ;;
            *)
              echo "Unsupported tag: $TAG"
              exit 1
              ;;
          esac

      # Extract version from tag
      - name: Get version from tag
        id: get_version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#*-v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # Generate changelog from git log
      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            # If no previous tag exists, get all commits
            CHANGELOG=$(git log --pretty=format:"* %s (%h)")
          else
            # Get commits since last tag
            CHANGELOG=$(git log --pretty=format:"* %s (%h)" $PREVIOUS_TAG..HEAD)
          fi
          # Properly escape the changelog for GitHub Actions output
          echo "CHANGELOG<<delimiter" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "delimiter" >> $GITHUB_OUTPUT

      # Create GitHub Release (skip if tag already has a release — safe for workflow reruns)
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.CHANGELOG }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --repo "${{ github.repository }}" 2>/dev/null; then
            echo "Release for $TAG already exists — skipping create"
            exit 0
          fi
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' "$CHANGELOG_BODY" > "$NOTES_FILE"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Release ${{ steps.get_version.outputs.VERSION }}" \
            --notes-file "$NOTES_FILE"

      # Publish the tagged package only (skip if this version is already on npm — safe for reruns)
      - name: Publish tagged package
        working-directory: ${{ steps.resolve_pkg.outputs.PKG_DIR }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sh "${{ github.workspace }}/scripts/npm-publish-if-not-on-registry.sh"

      # Notify on success
      - name: Notify on success
        if: success()
        run: |
          echo "🎉 Successfully published version ${{ steps.get_version.outputs.VERSION }} to npm and GitHub Packages!"
          echo "📦 npm:"
          echo "  - @sgedda/mockifyer-core: https://www.npmjs.com/package/@sgedda/mockifyer-core"
          echo "  - @sgedda/mockifyer-axios: https://www.npmjs.com/package/@sgedda/mockifyer-axios"
          echo "  - @sgedda/mockifyer-fetch: https://www.npmjs.com/package/@sgedda/mockifyer-fetch"
          echo "📦 GitHub Packages: https://github.com/${{ github.repository }}?tab=packages"
          echo "📝 Release: https://github.com/${{ github.repository }}/releases/tag/${GITHUB_REF#refs/tags/}"
